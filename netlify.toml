[build]
  command = "npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "20", SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_STRIPE_PUBLISHABLE_KEY,VITE_GOOGLE_SHEET_URL" }

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://*.supabase.co https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://*.supabase.co https://*.googleusercontent.com; connect-src 'self' https://*.supabase.co https://api.stripe.com https://script.google.com https://script.googleusercontent.com; frame-src https://js.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Immutable cache for hashed static assets
[[headers]]
  for = "/_assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# DSA guide — relaxed CSP for interactive code playground (esm.sh CDN + eval in Web Worker)
[[headers]]
  for = "/dsa.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' https://*.supabase.co https://js.stripe.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://*.supabase.co https://*.googleusercontent.com; connect-src 'self' https://*.supabase.co https://api.stripe.com https://script.google.com https://script.googleusercontent.com https://esm.sh; frame-src https://js.stripe.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'"

[[redirects]]
  from = "/dsa"
  to = "/dsa.html"
  status = 200

[[redirects]]
  from = "/leetcode"
  to = "/leetcode.html"
  status = 200

[[redirects]]
  from = "/github"
  to = "/github.html"
  status = 200

[[redirects]]
  from = "/ai-website"
  to = "/ai-website.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

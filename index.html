    <!-- SEO -->

      name="description"
      content="Adverse LLC — full-stack web development, cloud architecture, and technical consulting based in Charlotte, NC. We build reliable, scalable software for startups and businesses."

      name="keywords"
      content="software development, web development, full-stack developer, React, Spring Boot, Java, cloud architecture, AWS, consulting, Charlotte NC, Adverse LLC, Adam Abdulkadir"

    <meta property="og:type" content="website" />

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Java Interview Guide</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #151d2e;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --easy: #10b981;
    --medium: #f59e0b;
    --hard: #ef4444;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Syne’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
}

/* Grid background */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

header {
position: relative;
text-align: center;
padding: 60px 20px 40px;
z-index: 1;
}

.header-tag {
display: inline-block;
font-family: ‘JetBrains Mono’, monospace;
font-size: 11px;
color: var(–accent);
background: rgba(0,212,255,0.08);
border: 1px solid rgba(0,212,255,0.2);
padding: 4px 14px;
border-radius: 20px;
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 20px;
}

h1 {
font-size: clamp(2.2rem, 5vw, 3.8rem);
font-weight: 800;
line-height: 1.1;
background: linear-gradient(135deg, #fff 0%, var(–accent) 50%, var(–accent2) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 14px;
}

.subtitle {
color: var(–muted);
font-size: 1rem;
font-family: ‘JetBrains Mono’, monospace;
letter-spacing: 0.5px;
}

/* Stats bar */
.stats-bar {
display: flex;
justify-content: center;
gap: 32px;
padding: 20px;
margin: 0 auto 40px;
max-width: 600px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
position: relative;
z-index: 1;
flex-wrap: wrap;
}

.stat {
text-align: center;
}

.stat-num {
font-size: 1.6rem;
font-weight: 800;
display: block;
}

.stat-label {
font-size: 0.7rem;
color: var(–muted);
font-family: ‘JetBrains Mono’, monospace;
text-transform: uppercase;
letter-spacing: 1px;
}

.stat-easy .stat-num { color: var(–easy); }
.stat-medium .stat-num { color: var(–medium); }
.stat-hard .stat-num { color: var(–hard); }
.stat-total .stat-num { color: var(–accent); }

/* Filter buttons */
.filters {
display: flex;
justify-content: center;
gap: 10px;
padding: 0 20px 30px;
flex-wrap: wrap;
position: relative;
z-index: 1;
}

.filter-btn {
font-family: ‘JetBrains Mono’, monospace;
font-size: 12px;
padding: 7px 18px;
border-radius: 6px;
border: 1px solid var(–border);
background: var(–surface);
color: var(–muted);
cursor: pointer;
transition: all 0.2s;
text-transform: uppercase;
letter-spacing: 1px;
}

.filter-btn:hover, .filter-btn.active {
border-color: var(–accent);
color: var(–accent);
background: rgba(0,212,255,0.07);
}

.filter-btn.easy.active { border-color: var(–easy); color: var(–easy); background: rgba(16,185,129,0.07); }
.filter-btn.medium.active { border-color: var(–medium); color: var(–medium); background: rgba(245,158,11,0.07); }
.filter-btn.hard.active { border-color: var(–hard); color: var(–hard); background: rgba(239,68,68,0.07); }

/* Main grid */
.container {
max-width: 1200px;
margin: 0 auto;
padding: 0 20px 80px;
position: relative;
z-index: 1;
}

.question-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 16px;
margin-bottom: 20px;
overflow: hidden;
transition: border-color 0.3s, transform 0.2s;
animation: fadeUp 0.4s ease both;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(16px); }
to { opacity: 1; transform: translateY(0); }
}

.question-card:hover { border-color: rgba(0,212,255,0.3); transform: translateY(-1px); }

.card-header {
display: flex;
align-items: center;
gap: 14px;
padding: 20px 24px;
cursor: pointer;
user-select: none;
}

.q-number {
font-family: ‘JetBrains Mono’, monospace;
font-size: 11px;
color: var(–muted);
min-width: 28px;
}

.q-title {
font-size: 1rem;
font-weight: 700;
flex: 1;
}

.difficulty-badge {
font-family: ‘JetBrains Mono’, monospace;
font-size: 10px;
padding: 3px 10px;
border-radius: 4px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 1px;
}

.easy-badge { background: rgba(16,185,129,0.15); color: var(–easy); border: 1px solid rgba(16,185,129,0.3); }
.medium-badge { background: rgba(245,158,11,0.15); color: var(–medium); border: 1px solid rgba(245,158,11,0.3); }
.hard-badge { background: rgba(239,68,68,0.15); color: var(–hard); border: 1px solid rgba(239,68,68,0.3); }

.topic-tag {
font-family: ‘JetBrains Mono’, monospace;
font-size: 10px;
padding: 3px 8px;
border-radius: 4px;
background: rgba(124,58,237,0.15);
color: #a78bfa;
border: 1px solid rgba(124,58,237,0.25);
}

.toggle-icon {
color: var(–muted);
font-size: 18px;
transition: transform 0.3s;
min-width: 20px;
text-align: center;
}

.card-body {
display: none;
padding: 0 24px 24px;
}

.card-body.open { display: block; animation: slideDown 0.25s ease; }

@keyframes slideDown {
from { opacity: 0; transform: translateY(-8px); }
to { opacity: 1; transform: translateY(0); }
}

.divider { height: 1px; background: var(–border); margin-bottom: 20px; }

.section-label {
font-family: ‘JetBrains Mono’, monospace;
font-size: 10px;
text-transform: uppercase;
letter-spacing: 2px;
color: var(–accent);
margin-bottom: 8px;
display: flex;
align-items: center;
gap: 8px;
}

.section-label::after {
content: ‘’;
flex: 1;
height: 1px;
background: rgba(0,212,255,0.15);
}

.problem-desc {
color: #94a3b8;
font-size: 0.9rem;
line-height: 1.7;
margin-bottom: 20px;
font-family: ‘JetBrains Mono’, monospace;
}

.complexity-row {
display: flex;
gap: 20px;
margin-bottom: 20px;
flex-wrap: wrap;
}

.complexity-item {
font-family: ‘JetBrains Mono’, monospace;
font-size: 12px;
color: var(–muted);
}

.complexity-item span {
color: var(–accent3);
font-weight: 600;
}

pre {
background: #0d1117;
border: 1px solid var(–border);
border-radius: 10px;
padding: 20px;
overflow-x: auto;
margin-bottom: 16px;
position: relative;
}

pre::before {
content: ‘JAVA’;
position: absolute;
top: 8px;
right: 12px;
font-family: ‘JetBrains Mono’, monospace;
font-size: 9px;
color: var(–muted);
letter-spacing: 2px;
}

code {
font-family: ‘JetBrains Mono’, monospace;
font-size: 13px;
line-height: 1.8;
color: #cdd9e5;
}

.kw { color: #ff79c6; }
.type { color: #8be9fd; }
.fn { color: #50fa7b; }
.str { color: #f1fa8c; }
.num { color: #bd93f9; }
.comment { color: #6272a4; font-style: italic; }
.var { color: #ffb86c; }

.explanation {
background: rgba(0,212,255,0.04);
border-left: 3px solid var(–accent);
border-radius: 0 8px 8px 0;
padding: 14px 18px;
font-size: 0.88rem;
line-height: 1.75;
color: #94a3b8;
font-family: ‘JetBrains Mono’, monospace;
}

.explanation strong { color: var(–text); }

/* Footer */
footer {
text-align: center;
padding: 30px;
color: var(–muted);
font-family: ‘JetBrains Mono’, monospace;
font-size: 11px;
letter-spacing: 1px;
position: relative;
z-index: 1;
}

.hidden { display: none !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(–bg); }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(–muted); }
</style>

</head>
<body>

<header>
  <div class="header-tag">&#x2B50; Interview Prep</div>
  <h1>LeetCode Java<br>Interview Guide</h1>
  <p class="subtitle">// 20 most common coding interview questions</p>
</header>

<div class="stats-bar">
  <div class="stat stat-total"><span class="stat-num">20</span><span class="stat-label">Total</span></div>
  <div class="stat stat-easy"><span class="stat-num">7</span><span class="stat-label">Easy</span></div>
  <div class="stat stat-medium"><span class="stat-num">10</span><span class="stat-label">Medium</span></div>
  <div class="stat stat-hard"><span class="stat-num">3</span><span class="stat-label">Hard</span></div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filter('all', this)">All</button>
  <button class="filter-btn easy" onclick="filter('easy', this)">Easy</button>
  <button class="filter-btn medium" onclick="filter('medium', this)">Medium</button>
  <button class="filter-btn hard" onclick="filter('hard', this)">Hard</button>
</div>

<div class="container" id="questions"></div>

<footer>crafted for engineers &mdash; study hard, ship fast</footer>

<script>
const questions = [
  {
    num: 1,
    title: "Two Sum",
    difficulty: "easy",
    topic: "Hash Map",
    desc: "Given an array of integers nums and an integer target, return indices of the two numbers such that they add up to target.",
    timeComplexity: "O(n)",
    spaceComplexity: "O(n)",
    code: `<span class="kw">class</span> <span class="type">Solution</span> {
    <span class="kw">public</span> <span class="type">int</span>[] <span class="fn">twoSum</span>(<span class="type">int</span>[] <span class="var">nums</span>, <span class="type">int</span> <span class="var">target</span>) {
        <span class="type">Map</span>&lt;<span class="type">Integer</span>, <span class="type">Integer</span>&gt; <span class="var">map</span> = <span class="kw">new</span> <span class="type">HashMap</span>&lt;&gt;();
        <span class="kw">for</span> (<span class="type">int</span> <span class="var">i</span> = <span class="num">0</span>; <span class="var">i</span> &lt; <span class="var">nums</span>.length; <span class="var">i</span>++) {
            <span class="type">int</span> <span class="var">complement</span> = <span class="var">target</span> - <span class="var">nums</span>[<span class="var">i</span>];
            <span class="kw">if</span> (<span class="var">map</span>.containsKey(<span class="var">complement</span>)) {
                <span class="kw">return new</span> <span class="type">int</span>[]{<span class="var">map</span>.get(<span class="var">complement</span>), <span class="var">i</span>};
            }
            <span class="var">map</span>.put(<span class="var">nums</span>[<span class="var">i</span>], <span class="var">i</span>);
        }
        <span class="kw">return new</span> <span class="type">int</span>[]{};
    }
}`,
    explanation: "<strong>Strategy:</strong> Use a HashMap to store each number and its index. For every element, check if its complement (target - nums[i]) already exists in the map. If yes, we found our pair. This avoids the O(n²) brute force double loop."
  },
  {
    num: 2,
    title: "Valid Parentheses",
    difficulty: "easy",
    topic: "Stack",
    desc: "Given a string s containing just '(', ')', '{', '}', '[' and ']', determine if the input string is valid.",
    timeComplexity: "O(n)",
    spaceComplexity: "O(n)",
    code: `<span class="kw">class</span> <span class="type">Solution</span> {
    <span class="kw">public boolean</span> <span class="fn">isValid</span>(<span class="type">String</span> <span class="var">s</span>) {
        <span class="type">Stack</span>&lt;<span class="type">Character</span>&gt; <span class="var">stack</span> = <span class="kw">new</span> <span class="type">Stack</span>&lt;&gt;();
        <span class="kw">for</span> (<span class="type">char</span> <span class="var">c</span> : <span class="var">s</span>.toCharArray()) {
            <span class="kw">if</span> (<span class="var">c</span> == <span class="str">'('</span> || <span class="var">c</span> == <span class="str">'['</span> || <span class="var">c</span> == <span class="str">'{'</span>) {
                <span class="var">stack</span>.push(<span class="var">c</span>);
            } <span class="kw">else</span> {
                <span class="kw">if</span> (<span class="var">stack</span>.isEmpty()) <span class="kw">return false</span>;
                <span class="type">char</span> <span class="var">top</span> = <span class="var">stack</span>.pop();
                <span class="kw">if</span> (<span class="var">c</span> == <span class="str">')'</span> &amp;&amp; <span class="var">top</span> != <span class="str">'('</span>) <span class="kw">return false</span>;
                <span class="kw">if</span> (<span class="var">c</span> == <span class="str">']'</span> &amp;&amp; <span class="var">top</span> != <span class="str">'['</span>) <span class="kw">return false</span>;
                <span class="kw">if</span> (<span class="var">c</span> == <span class="str">'}'</span> &amp;&amp; <span class="var">top</span> != <span class="str">'{'</span>) <span class="kw">return false</span>;
            }
        }
        <span class="kw">return</span> <span class="var">stack</span>.isEmpty();
    }
}`,
    explanation: "<strong>Strategy:</strong> Use a Stack. Push opening brackets. When a closing bracket is encountered, check if the stack's top is the matching opener. If not, or if the stack is empty at any closing bracket, it's invalid. At the end, the stack must be empty."
  },
  {
    num: 3,
    title: "Reverse a Linked List",
    difficulty: "easy",
    topic: "Linked List",
    desc: "Given the head of a singly linked list, reverse the list, and return the reversed list.",
    timeComplexity: "O(n)",
    spaceComplexity: "O(1)",
    code: `<span class="kw">class</span> <span class="type">Solution</span> {
    <span class="kw">public</span> <span class="type">ListNode</span> <span class="fn">reverseList</span>(<span class="type">ListNode</span> <span class="var">head</span>) {
        <span class="type">ListNode</span> <span class="var">prev</span> = <span class="kw">null</span>;
        <span class="type">ListNode</span> <span class="var">curr</span> = <span class="var">head</span>;
        <span class="kw">while</span> (<span class="var">curr</span> != <span class="kw">null</span>) {
            <span class="type">ListNode</span> <span class="var">next</span> = <span class="var">curr</span>.next; <span class="comment">// save next</span>
            <span class="var">curr</span>.next = <span class="var">prev</span>;         <span class="comment">// reverse pointer</span>
            <span class="var">prev</span> = <span class="var">curr</span>;              <span class="comment">// move prev forward</span>
            <span class="var">curr</span> = <span class="var">next</span>;              <span class="comment">// move curr forward</span>
        }
        <span class="kw">return</span> <span class="var">prev</span>;
    }
}`,
    explanation: "<strong>Strategy:</strong> Use three pointers: prev (null), curr (head), and next. In each iteration, save curr.next, reverse the pointer to prev, then advance both prev and curr. When curr is null, prev points to the new head."
  },
  {
    num: 4,
    title: "Merge Two Sorted Lists",
    difficulty: "easy",
    topic: "Linked List",
    desc: "Merge two sorted linked lists and return it as a new sorted list built by splicing together the nodes of the two lists.",
    timeComplexity: "O(m+n)",
    spaceComplexity: "O(1)",
    code: `<span class="kw">class</span> <span class="type">Solution</span> {
    <span class="kw">public</span> <span class="type">ListNode</span> <span class="fn">mergeTwoLists</span>(<span class="type">ListNode</span> <span class="var">l1</span>, <span class="type">ListNode</span> <span class="var">l2</span>) {
        <span class="type">ListNode</span> <span class="var">dummy</span> = <span class="kw">new</span> <span class="type">ListNode</span>(<span class="num">0</span>);
        <span class="type">ListNode</span> <span class="var">cur</span> = <span class="var">dummy</span>;
        <span class="kw">while</span> (<span class="var">l1</span> != <span class="kw">null</span> &amp;&amp; <span class="var">l2</span> != <span class="kw">null</span>) {
            <span class="kw">if</span> (<span class="var">l1</span>.val &lt;= <span class="var">l2</span>.val) {
                <span class="var">cur</span>.next = <span class="var">l1</span>;
                <span class="var">l1</span> = <span class="var">l1</span>.next;
            } <span class="kw">else</span> {
                <span class="var">cur</span>.next = <span class="var">l2</span>;
                <span class="var">l2</span> = <span class="var">l2</span>.next;
            }
            <span class="var">cur</span> = <span class="var">cur</span>.next;
        }
        <span class="var">cur</span>.next = (<span class="var">l1</span> != <span class="kw">null</span>) ? <span class="var">l1</span> : <span class="var">l2</span>;
        <span class="kw">return</span> <span class="var">dummy</span>.next;
    }
}`,
    explanation: "<strong>Strategy:</strong> Use a dummy head node to simplify edge cases. Compare the front nodes of both lists, attach the smaller one to the result, and advance that pointer. After the loop, attach the remaining non-null list."
  },
  {
    num: 5,
    title: "Maximum Subarray (Kadane's)",
    difficulty: "medium",
    topic: "Dynamic Programming",
    desc: "Given an integer array nums, find the contiguous subarray which has the largest sum and return its sum.",
    timeComplexity: "O(n)",
    spaceComplexity: "O(1)",
    code: `<span class="kw">class</span> <span class="type">Solution</span> {
    <span class="kw">public int</span> <span class="fn">maxSubArray</span>(<span class="type">int</span>[] <span class="var">nums</span>) {
        <span class="type">int</span> <span class="var">maxSum</span> = <span class="var">nums</span>[<span class="num">0</span>];
        <span class="type">int</span> <span class="var">currSum</span> = <span class="var">nums</span>[<span class="num">0</span>];
        <span class="kw">for</span> (<span class="type">int</span> <span class="var">i</span> = <span class="num">1</span>; <span class="var">i</span> &lt; <span class="var">nums</span>.length; <span class="var">i</span>++) {
            <span class="comment">// Either extend the subarray or start fresh</span>
            <span class="var">currSum</span> = <span class="type">Math</span>.max(<span class="var">nums</span>[<span class="var">i</span>], <span class="var">currSum</span> + <span class="var">nums</span>[<span class="var">i</span>]);
            <span class="var">maxSum</span> = <span class="type">Math</span>.max(<span class="var">maxSum</span>, <span class="var">currSum</span>);
        }
        <span class="kw">return</span> <span class="var">maxSum</span>;
    }
}`,
    explanation: "<strong>Strategy (Kadane's Algorithm):</strong> At each index, decide: is it better to extend the previous subarray or start a new subarray here? currSum = max(nums[i], currSum + nums[i]). Track the global maximum throughout."
  },
  {
    num: 6,
    title: "Best Time to Buy and Sell Stock",
    difficulty: "easy",
    topic: "Greedy / Sliding Window",
    desc: "Given an array prices where prices[i] is the price of a stock on day i, maximize your profit by choosing a single buy and sell day.",
    timeComplexity: "O(n)",
    spaceComplexity: "O(1)",
    code: `<span class="kw">class</span> <span class="type">Solution</span> {
    <span class="kw">public int</span> <span class="fn">maxProfit</span>(<span class="type">int</span>[] <span class="var">prices</span>) {
        <span class="type">int</span> <span class="var">minPrice</span> = <span class="type">Integer</span>.MAX_VALUE;
        <span class="type">int</span> <span class="var">maxProfit</span> = <span class="num">0</span>;
        <span class="kw">for</span> (<span class="type">int</span> <span class="var">price</span> : <span class="var">prices</span>) {
            <span class="kw">if</span> (<span class="var">price</span> &lt; <span class="var">minPrice</span>) {
                <span class="var">minPrice</span> = <span class="var">price</span>;
            } <span class="kw">else if</span> (<span class="var">price</span> - <span class="var">minPrice</span> &gt; <span class="var">maxProfit</span>) {
                <span class="var">maxProfit</span> = <span class="var">price</span> - <span class="var">minPrice</span>;
            }
        }
        <span class="kw">return</span> <span class="var">maxProfit</span>;
    }
}`,
    explanation: "<strong>Strategy:</strong> Single pass. Track the minimum price seen so far. For each price, calculate profit if we sold today (price - minPrice). Keep a running max of that profit. We never need to look back."
  },
  {
    num: 7,
    title: "Climbing Stairs",
    difficulty: "easy",
    topic: "Dynamic Programming",
    desc: "You are climbing a staircase with n steps. Each time you can climb 1 or 2 steps. In how many distinct ways can you climb to the top?",
    timeComplexity: "O(n)",
    spaceComplexity: "O(1)",
    code: `<span class="kw">class</span> <span class="type">Solution</span> {
    <span class="kw">public int</span> <span class="fn">climbStairs</span>(<span class="type">int</span> <span class="var">n</span>) {
        <span class="kw">if</span> (<span class="var">n</span> &lt;= <span class="num">2</span>) <span class="kw">return</span> <span class="var">n</span>;
        <span class="type">int</span> <span class="var">a</span> = <span class="num">1</span>, <span class="var">b</span> = <span class="num">2</span>;
        <span class="kw">for</span> (<span class="type">int</span> <span class="var">i</span> = <span class="num">3</span>; <span class="var">i</span> &lt;= <span class="var">n</span>; <span class="var">i</span>++) {
            <span class="type">int</span> <span class="var">temp</span> = <span class="var">a</span> + <span class="var">b</span>;
            <span class="var">a</span> = <span class="var">b</span>;
            <span class="var">b</span> = <span class="var">temp</span>;
        }
        <span class="kw">return</span> <span class="var">b</span>;
    }
}`,

        <span class="type">Map</span>&lt;<span class="type">Integer</span>, <span class="type">Integer</span>&gt; <span class="var">freq</span> = <span class="kw">new</span> <span class="type">HashMap</span>&lt;&gt;();
        <span class="kw">for</span> (<span class="type">int</span> <span class="var">n</span> : <span class="var">nums</span>) <span class="var">freq</span>.merge(<span class="var">n</span>, <span class="num">1</span>, <span class="type">Integer</span>::sum);

        <span class="comment">// Min-heap of size k keyed by frequency</span>
        <span class="type">PriorityQueue</span>&lt;<span class="type">Integer</span>&gt; <span class="var">heap</span> =
            <span class="kw">new</span> <span class="type">PriorityQueue</span>&lt;&gt;((<span class="var">a</span>, <span class="var">b</span>) -> <span class="var">freq</span>.get(<span class="var">a</span>) - <span class="var">freq</span>.get(<span class="var">b</span>));

        <span class="kw">for</span> (<span class="type">int</span> <span class="var">num</span> : <span class="var">freq</span>.keySet()) {
            <span class="var">heap</span>.offer(<span class="var">num</span>);
            <span class="kw">if</span> (<span class="var">heap</span>.size() &gt; <span class="var">k</span>) <span class="var">heap</span>.poll(); <span class="comment">// evict least frequent</span>
        }
        <span class="kw">return</span> <span class="var">heap</span>.stream().mapToInt(<span class="type">Integer</span>::intValue).toArray();
    }
}`,
    explanation: "<strong>Strategy:</strong> Count frequencies with a HashMap. Then use a min-heap of size k — this always evicts the least frequent element, so we're left with the k most frequent. Heap size never exceeds k, keeping it O(n log k) instead of O(n log n)."
  },
  {
    num: 18,
    title: "Word Break",
    difficulty: "medium",
    topic: "Dynamic Programming",
    desc: "Given a string s and a dictionary wordDict, return true if s can be segmented into space-separated sequence of one or more dictionary words.",
    timeComplexity: "O(n²)",
    spaceComplexity: "O(n)",
    code: `<span class="kw">class</span> <span class="type">Solution</span> {
    <span class="kw">public boolean</span> <span class="fn">wordBreak</span>(<span class="type">String</span> <span class="var">s</span>, <span class="type">List</span>&lt;<span class="type">String</span>&gt; <span class="var">wordDict</span>) {
        <span class="type">Set</span>&lt;<span class="type">String</span>&gt; <span class="var">dict</span> = <span class="kw">new</span> <span class="type">HashSet</span>&lt;&gt;(<span class="var">wordDict</span>);
        <span class="type">boolean</span>[] <span class="var">dp</span> = <span class="kw">new</span> <span class="type">boolean</span>[<span class="var">s</span>.length() + <span class="num">1</span>];
        <span class="var">dp</span>[<span class="num">0</span>] = <span class="kw">true</span>; <span class="comment">// empty string</span>

            <span class="kw">for</span> (<span class="type">int</span> <span class="var">j</span> = <span class="num">0</span>; <span class="var">j</span> &lt; <span class="var">i</span>; <span class="var">j</span>++) {
                <span class="kw">if</span> (<span class="var">dp</span>[<span class="var">j</span>] &amp;&amp; <span class="var">dict</span>.contains(<span class="var">s</span>.substring(<span class="var">j</span>, <span class="var">i</span>))) {
                    <span class="var">dp</span>[<span class="var">i</span>] = <span class="kw">true</span>;
                    <span class="kw">break</span>;

        }
        <span class="kw">return</span> <span class="var">dp</span>[<span class="var">s</span>.length()];
    }
}`,
    explanation: "<strong>Strategy:</strong> dp[i] = true means s[0..i-1] can be segmented. For each position i, check all substrings s[j..i]. If dp[j] is true AND s[j..i] is in the dictionary, then dp[i] = true. Convert wordDict to a HashSet for O(1) lookup."
  },
  {
    num: 19,
    title: "Median of Two Sorted Arrays",
    difficulty: "hard",
    topic: "Binary Search",
    desc: "Given two sorted arrays nums1 and nums2 of size m and n respectively, return the median of the two sorted arrays. Runtime must be O(log(m+n)).",
    timeComplexity: "O(log(min(m,n)))",
    spaceComplexity: "O(1)",
    code: `<span class="kw">class</span> <span class="type">Solution</span> {
    <span class="kw">public double</span> <span class="fn">findMedianSortedArrays</span>(<span class="type">int</span>[] <span class="var">nums1</span>, <span class="type">int</span>[] <span class="var">nums2</span>) {
        <span class="kw">if</span> (<span class="var">nums1</span>.length &gt; <span class="var">nums2</span>.length)
            <span class="kw">return</span> <span class="fn">findMedianSortedArrays</span>(<span class="var">nums2</span>, <span class="var">nums1</span>);
        <span class="type">int</span> <span class="var">m</span> = <span class="var">nums1</span>.length, <span class="var">n</span> = <span class="var">nums2</span>.length;
        <span class="type">int</span> <span class="var">lo</span> = <span class="num">0</span>, <span class="var">hi</span> = <span class="var">m</span>;
        <span class="kw">while</span> (<span class="var">lo</span> &lt;= <span class="var">hi</span>) {
            <span class="type">int</span> <span class="var">i</span> = (<span class="var">lo</span> + <span class="var">hi</span>) / <span class="num">2</span>;
            <span class="type">int</span> <span class="var">j</span> = (<span class="var">m</span> + <span class="var">n</span> + <span class="num">1</span>) / <span class="num">2</span> - <span class="var">i</span>;
            <span class="type">int</span> <span class="var">maxL1</span> = <span class="var">i</span> == <span class="num">0</span> ? <span class="type">Integer</span>.MIN_VALUE : <span class="var">nums1</span>[<span class="var">i</span>-<span class="num">1</span>];
            <span class="type">int</span> <span class="var">minR1</span> = <span class="var">i</span> == <span class="var">m</span> ? <span class="type">Integer</span>.MAX_VALUE : <span class="var">nums1</span>[<span class="var">i</span>];
            <span class="type">int</span> <span class="var">maxL2</span> = <span class="var">j</span> == <span class="num">0</span> ? <span class="type">Integer</span>.MIN_VALUE : <span class="var">nums2</span>[<span class="var">j</span>-<span class="num">1</span>];
            <span class="type">int</span> <span class="var">minR2</span> = <span class="var">j</span> == <span class="var">n</span> ? <span class="type">Integer</span>.MAX_VALUE : <span class="var">nums2</span>[<span class="var">j</span>];
            <span class="kw">if</span> (<span class="var">maxL1</span> &lt;= <span class="var">minR2</span> &amp;&amp; <span class="var">maxL2</span> &lt;= <span class="var">minR1</span>) {
                <span class="kw">if</span> ((<span class="var">m</span> + <span class="var">n</span>) % <span class="num">2</span> == <span class="num">1</span>)
                    <span class="kw">return</span> <span class="type">Math</span>.max(<span class="var">maxL1</span>, <span class="var">maxL2</span>);
                <span class="kw">return</span> (<span class="type">Math</span>.max(<span class="var">maxL1</span>, <span class="var">maxL2</span>) + <span class="type">Math</span>.min(<span class="var">minR1</span>, <span class="var">minR2</span>)) / <span class="num">2.0</span>;
            } <span class="kw">else if</span> (<span class="var">maxL1</span> &gt; <span class="var">minR2</span>) <span class="var">hi</span> = <span class="var">i</span> - <span class="num">1</span>;
            <span class="kw">else</span> <span class="var">lo</span> = <span class="var">i</span> + <span class="num">1</span>;
        }
        <span class="kw">return</span> -<span class="num">1</span>;
    }
}`,
    explanation: "<strong>Strategy:</strong> Binary search on the smaller array to find the correct partition point. We want to partition both arrays such that: all elements on the left &lt;= all elements on the right. Always binary search on the shorter array for efficiency. Handle odd/even total length separately."
  },
  {
    num: 20,
    title: "Trapping Rain Water",
    difficulty: "hard",
    topic: "Two Pointers",
    desc: "Given n non-negative integers representing an elevation map where the width of each bar is 1, compute how much water it can trap after raining.",
    timeComplexity: "O(n)",
    spaceComplexity: "O(1)",
    code: `<span class="kw">class</span> <span class="type">Solution</span> {
    <span class="kw">public int</span> <span class="fn">trap</span>(<span class="type">int</span>[] <span class="var">height</span>) {
        <span class="type">int</span> <span class="var">left</span> = <span class="num">0</span>, <span class="var">right</span> = <span class="var">height</span>.length - <span class="num">1</span>;
        <span class="type">int</span> <span class="var">maxLeft</span> = <span class="num">0</span>, <span class="var">maxRight</span> = <span class="num">0</span>;
        <span class="type">int</span> <span class="var">water</span> = <span class="num">0</span>;
        <span class="kw">while</span> (<span class="var">left</span> &lt; <span class="var">right</span>) {
            <span class="kw">if</span> (<span class="var">height</span>[<span class="var">left</span>] &lt; <span class="var">height</span>[<span class="var">right</span>]) {
                <span class="kw">if</span> (<span class="var">height</span>[<span class="var">left</span>] &gt;= <span class="var">maxLeft</span>) <span class="var">maxLeft</span> = <span class="var">height</span>[<span class="var">left</span>];
                <span class="kw">else</span> <span class="var">water</span> += <span class="var">maxLeft</span> - <span class="var">height</span>[<span class="var">left</span>];
                <span class="var">left</span>++;
            } <span class="kw">else</span> {
                <span class="kw">if</span> (<span class="var">height</span>[<span class="var">right</span>] &gt;= <span class="var">maxRight</span>) <span class="var">maxRight</span> = <span class="var">height</span>[<span class="var">right</span>];
                <span class="kw">else</span> <span class="var">water</span> += <span class="var">maxRight</span> - <span class="var">height</span>[<span class="var">right</span>];
                <span class="var">right</span>--;
            }
        }
        <span class="kw">return</span> <span class="var">water</span>;
    }
}`,
    explanation: "<strong>Strategy (Two Pointers):</strong> Water at any position = min(maxLeft, maxRight) - height[i]. The key insight: if height[left] &lt; height[right], the water level at left is determined by maxLeft. Process the side with the lower bar, update that side's max, accumulate water. This avoids the O(n) space of precomputing prefix/suffix max arrays."
  }
];

function render(data) {
  const container = document.getElementById('questions');
  container.innerHTML = '';
  data.forEach((q, idx) => {
    const div = document.createElement('div');
    div.className = `question-card`;
    div.dataset.difficulty = q.difficulty;
    div.style.animationDelay = `${idx * 0.04}s`;
    div.innerHTML = `
      <div class="card-header" onclick="toggle(this)">
        <span class="q-number">#${String(q.num).padStart(2,'0')}</span>
        <span class="q-title">${q.title}</span>
        <span class="topic-tag">${q.topic}</span>
        <span class="difficulty-badge ${q.difficulty}-badge">${q.difficulty}</span>
        <span class="toggle-icon">+</span>
      </div>
      <div class="card-body">
        <div class="divider"></div>
        <div class="section-label">Problem</div>
        <div class="problem-desc">${q.desc}</div>
        <div class="complexity-row">
          <span class="complexity-item">Time: <span>${q.timeComplexity}</span></span>
          <span class="complexity-item">Space: <span>${q.spaceComplexity}</span></span>
        </div>
        <div class="section-label">Solution</div>
        <pre><code>${q.code}</code></pre>

```
    <div class="section-label">Explanation</div>
    <div class="explanation">${q.explanation}</div>
  </div>
`;
container.appendChild(div);
```

});
}

function toggle(header) {
const body = header.nextElementSibling;
const icon = header.querySelector(’.toggle-icon’);
body.classList.toggle(‘open’);
icon.textContent = body.classList.contains(‘open’) ? ‘−’ : ‘+’;
icon.style.transform = body.classList.contains(‘open’) ? ‘rotate(0deg)’ : ‘rotate(0deg)’;
}

function filter(type, btn) {
document.querySelectorAll(’.filter-btn’).forEach(b => b.classList.remove(‘active’));
btn.classList.add(‘active’);
const filtered = type === ‘all’ ? questions : questions.filter(q => q.difficulty === type);
render(filtered);
}

render(questions);
</script>

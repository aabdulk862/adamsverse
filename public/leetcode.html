    <script>
      var Q = [
        {
          num: 1,
          title: "Two Sum",
          difficulty: "easy",
          topic: "Hash Map",
          desc: "Given an array of integers nums and an integer target, return indices of the two numbers such that they add up to target.",
          tc: "O(n)",
          sc: "O(n)",
          code: '<span class="kw">class</span> <span class="type">Solution</span> {\n    <span class="kw">public</span> <span class="type">int</span>[] <span class="fn">twoSum</span>(<span class="type">int</span>[] <span class="var">nums</span>, <span class="type">int</span> <span class="var">target</span>) {\n        <span class="type">Map</span>&lt;<span class="type">Integer</span>, <span class="type">Integer</span>&gt; <span class="var">map</span> = <span class="kw">new</span> <span class="type">HashMap</span>&lt;&gt;();\n        <span class="kw">for</span> (<span class="type">int</span> <span class="var">i</span> = <span class="num">0</span>; <span class="var">i</span> &lt; <span class="var">nums</span>.length; <span class="var">i</span>++) {\n            <span class="type">int</span> <span class="var">comp</span> = <span class="var">target</span> - <span class="var">nums</span>[<span class="var">i</span>];\n            <span class="kw">if</span> (<span class="var">map</span>.containsKey(<span class="var">comp</span>))\n                <span class="kw">return new</span> <span class="type">int</span>[]{<span class="var">map</span>.get(<span class="var">comp</span>), <span class="var">i</span>};\n            <span class="var">map</span>.put(<span class="var">nums</span>[<span class="var">i</span>], <span class="var">i</span>);\n        }\n        <span class="kw">return new</span> <span class="type">int</span>[]{};\n    }\n}',
          exp: "<strong>Strategy:</strong> Store each number and its index in a HashMap. For every element, check if its complement (target - nums[i]) already exists. If yes, return both indices. Avoids the O(n²) brute-force double loop.",
        },
        {
          num: 2,
          title: "Valid Parentheses",
          difficulty: "easy",
          topic: "Stack",
          desc: "Given a string s containing just '(', ')', '{', '}', '[' and ']', determine if the input string is valid.",
          tc: "O(n)",
          sc: "O(n)",
          code: '<span class="kw">class</span> <span class="type">Solution</span> {\n    <span class="kw">public boolean</span> <span class="fn">isValid</span>(<span class="type">String</span> <span class="var">s</span>) {\n        <span class="type">Stack</span>&lt;<span class="type">Character</span>&gt; <span class="var">stack</span> = <span class="kw">new</span> <span class="type">Stack</span>&lt;&gt;();\n        <span class="kw">for</span> (<span class="type">char</span> <span class="var">c</span> : <span class="var">s</span>.toCharArray()) {\n            <span class="kw">if</span> (<span class="var">c</span>==\'(\'||<span class="var">c</span>==\'[\'||<span class="var">c</span>==\'{\') { <span class="var">stack</span>.push(<span class="var">c</span>); <span class="kw">continue</span>; }\n            <span class="kw">if</span> (<span class="var">stack</span>.isEmpty()) <span class="kw">return false</span>;\n            <span class="type">char</span> <span class="var">t</span> = <span class="var">stack</span>.pop();\n            <span class="kw">if</span> (<span class="var">c</span>==\')\' &amp;&amp; <span class="var">t</span>!=\'(\') <span class="kw">return false</span>;\n            <span class="kw">if</span> (<span class="var">c</span>==\']\' &amp;&amp; <span class="var">t</span>!=\'[\') <span class="kw">return false</span>;\n            <span class="kw">if</span> (<span class="var">c</span>==\'}\' &amp;&amp; <span class="var">t</span>!=\'{\') <span class="kw">return false</span>;\n        }\n        <span class="kw">return</span> <span class="var">stack</span>.isEmpty();\n    }\n}',
          exp: "<strong>Strategy:</strong> Push opening brackets onto a Stack. For each closing bracket, check the stack's top is the matching opener. If not, or stack is empty, it's invalid. Stack must be empty at the end.",
        },
        {
          num: 3,
          title: "Reverse a Linked List",
          difficulty: "easy",
          topic: "Linked List",
          desc: "Given the head of a singly linked list, reverse the list and return the reversed list.",
          tc: "O(n)",
          sc: "O(1)",
          code: '<span class="kw">class</span> <span class="type">Solution</span> {\n    <span class="kw">public</span> <span class="type">ListNode</span> <span class="fn">reverseList</span>(<span class="type">ListNode</span> <span class="var">head</span>) {\n        <span class="type">ListNode</span> <span class="var">prev</span> = <span class="kw">null</span>, <span class="var">curr</span> = <span class="var">head</span>;\n        <span class="kw">while</span> (<span class="var">curr</span> != <span class="kw">null</span>) {\n            <span class="type">ListNode</span> <span class="var">next</span> = <span class="var">curr</span>.next; <span class="comment">// save next</span>\n            <span class="var">curr</span>.next = <span class="var">prev</span>;         <span class="comment">// reverse pointer</span>\n            <span class="var">prev</span> = <span class="var">curr</span>;              <span class="comment">// advance prev</span>\n            <span class="var">curr</span> = <span class="var">next</span>;              <span class="comment">// advance curr</span>\n        }\n        <span class="kw">return</span> <span class="var">prev</span>;\n    }\n}',
          exp: "<strong>Strategy:</strong> Three pointers: prev (null), curr (head), next. Each iteration: save curr.next, flip curr.next to prev, advance both. When curr is null, prev is the new head.",
        },
        {
          num: 4,
          title: "Merge Two Sorted Lists",
          difficulty: "easy",
          topic: "Linked List",
          desc: "Merge two sorted linked lists and return the merged sorted list.",
          tc: "O(m+n)",
          sc: "O(1)",
          code: '<span class="kw">class</span> <span class="type">Solution</span> {\n    <span class="kw">public</span> <span class="type">ListNode</span> <span class="fn">mergeTwoLists</span>(<span class="type">ListNode</span> <span class="var">l1</span>, <span class="type">ListNode</span> <span class="var">l2</span>) {\n        <span class="type">ListNode</span> <span class="var">dummy</span> = <span class="kw">new</span> <span class="type">ListNode</span>(<span class="num">0</span>), <span class="var">cur</span> = <span class="var">dummy</span>;\n        <span class="kw">while</span> (<span class="var">l1</span> != <span class="kw">null</span> &amp;&amp; <span class="var">l2</span> != <span class="kw">null</span>) {\n            <span class="kw">if</span> (<span class="var">l1</span>.val &lt;= <span class="var">l2</span>.val) { <span class="var">cur</span>.next = <span class="var">l1</span>; <span class="var">l1</span> = <span class="var">l1</span>.next; }\n            <span class="kw">else</span>                   { <span class="var">cur</span>.next = <span class="var">l2</span>; <span class="var">l2</span> = <span class="var">l2</span>.next; }\n            <span class="var">cur</span> = <span class="var">cur</span>.next;\n        }\n        <span class="var">cur</span>.next = (<span class="var">l1</span> != <span class="kw">null</span>) ? <span class="var">l1</span> : <span class="var">l2</span>;\n        <span class="kw">return</span> <span class="var">dummy</span>.next;\n    }\n}',
          exp: "<strong>Strategy:</strong> Dummy head simplifies edge cases. Compare front nodes, attach the smaller one, advance that pointer. Attach leftover list after the loop.",
        },
        {
          num: 5,
          title: "Maximum Subarray (Kadane's)",
          difficulty: "medium",
          topic: "Dynamic Programming",
          desc: "Find the contiguous subarray with the largest sum and return its sum.",
          tc: "O(n)",
          sc: "O(1)",
          code: '<span class="kw">class</span> <span class="type">Solution</span> {\n    <span class="kw">public int</span> <span class="fn">maxSubArray</span>(<span class="type">int</span>[] <span class="var">nums</span>) {\n        <span class="type">int</span> <span class="var">maxSum</span> = <span class="var">nums</span>[<span class="num">0</span>], <span class="var">curr</span> = <span class="var">nums</span>[<span class="num">0</span>];\n        <span class="kw">for</span> (<span class="type">int</span> <span class="var">i</span> = <span class="num">1</span>; <span class="var">i</span> &lt; <span class="var">nums</span>.length; <span class="var">i</span>++) {\n            <span class="var">curr</span>   = <span class="type">Math</span>.max(<span class="var">nums</span>[<span class="var">i</span>], <span class="var">curr</span> + <span class="var">nums</span>[<span class="var">i</span>]);\n            <span class="var">maxSum</span> = <span class="type">Math</span>.max(<span class="var">maxSum</span>, <span class="var">curr</span>);\n        }\n        <span class="kw">return</span> <span class="var">maxSum</span>;\n    }\n}',
          exp: "<strong>Strategy (Kadane's):</strong> At each index decide: extend the previous subarray or start fresh? curr = max(nums[i], curr + nums[i]). Track the running global maximum.",
        },
        {
          num: 6,
          title: "Best Time to Buy and Sell Stock",
          difficulty: "easy",
          topic: "Greedy",
          desc: "Given prices[], maximize profit with one buy and one sell. You must buy before you sell.",
          tc: "O(n)",
          sc: "O(1)",
          code: '<span class="kw">class</span> <span class="type">Solution</span> {\n    <span class="kw">public int</span> <span class="fn">maxProfit</span>(<span class="type">int</span>[] <span class="var">prices</span>) {\n        <span class="type">int</span> <span class="var">minP</span> = <span class="type">Integer</span>.MAX_VALUE, <span class="var">maxP</span> = <span class="num">0</span>;\n        <span class="kw">for</span> (<span class="type">int</span> <span class="var">p</span> : <span class="var">prices</span>) {\n            <span class="kw">if</span> (<span class="var">p</span> &lt; <span class="var">minP</span>) <span class="var">minP</span> = <span class="var">p</span>;\n            <span class="kw">else if</span> (<span class="var">p</span> - <span class="var">minP</span> &gt; <span class="var">maxP</span>) <span class="var">maxP</span> = <span class="var">p</span> - <span class="var">minP</span>;\n        }\n        <span class="kw">return</span> <span class="var">maxP</span>;\n    }\n}',
          exp: "<strong>Strategy:</strong> Track minimum price seen so far. For each price, calculate potential profit (price - minPrice). Keep running max. Single pass, no look-back needed.",
        },
        {
          num: 7,
          title: "Climbing Stairs",
          difficulty: "easy",
          topic: "Dynamic Programming",
          desc: "You can climb 1 or 2 steps at a time. How many distinct ways can you reach the top of n stairs?",
          tc: "O(n)",
          sc: "O(1)",
          code: '<span class="kw">class</span> <span class="type">Solution</span> {\n    <span class="kw">public int</span> <span class="fn">climbStairs</span>(<span class="type">int</span> <span class="var">n</span>) {\n        <span class="kw">if</span> (<span class="var">n</span> &lt;= <span class="num">2</span>) <span class="kw">return</span> <span class="var">n</span>;\n        <span class="type">int</span> <span class="var">a</span> = <span class="num">1</span>, <span class="var">b</span> = <span class="num">2</span>;\n        <span class="kw">for</span> (<span class="type">int</span> <span class="var">i</span> = <span class="num">3</span>; <span class="var">i</span> &lt;= <span class="var">n</span>; <span class="var">i</span>++) {\n            <span class="type">int</span> <span class="var">t</span> = <span class="var">a</span> + <span class="var">b</span>; <span class="var">a</span> = <span class="var">b</span>; <span class="var">b</span> = <span class="var">t</span>;\n        }\n        <span class="kw">return</span> <span class="var">b</span>;\n    }\n}',
          exp: "<strong>Strategy:</strong> Fibonacci in disguise. ways(n) = ways(n-1) + ways(n-2). Use two variables for O(1) space instead of an array.",
        },
        {
          num: 8,
          title: "Longest Substring Without Repeating Characters",
          difficulty: "medium",
          topic: "Sliding Window",
          desc: "Find the length of the longest substring without repeating characters.",
          tc: "O(n)",
          sc: "O(min(m,n))",
          code: '<span class="kw">class</span> <span class="type">Solution</span> {\n    <span class="kw">public int</span> <span class="fn">lengthOfLongestSubstring</span>(<span class="type">String</span> <span class="var">s</span>) {\n        <span class="type">Map</span>&lt;<span class="type">Character</span>,<span class="type">Integer</span>&gt; <span class="var">map</span> = <span class="kw">new</span> <span class="type">HashMap</span>&lt;&gt;();\n        <span class="type">int</span> <span class="var">max</span> = <span class="num">0</span>, <span class="var">left</span> = <span class="num">0</span>;\n        <span class="kw">for</span> (<span class="type">int</span> <span class="var">r</span> = <span class="num">0</span>; <span class="var">r</span> &lt; <span class="var">s</span>.length(); <span class="var">r</span>++) {\n            <span class="type">char</span> <span class="var">c</span> = <span class="var">s</span>.charAt(<span class="var">r</span>);\n            <span class="kw">if</span> (<span class="var">map</span>.containsKey(<span class="var">c</span>))\n                <span class="var">left</span> = <span class="type">Math</span>.max(<span class="var">left</span>, <span class="var">map</span>.get(<span class="var">c</span>) + <span class="num">1</span>);\n            <span class="var">map</span>.put(<span class="var">c</span>, <span class="var">r</span>);\n            <span class="var">max</span> = <span class="type">Math</span>.max(<span class="var">max</span>, <span class="var">r</span> - <span class="var">left</span> + <span class="num">1</span>);\n        }\n        <span class="kw">return</span> <span class="var">max</span>;\n    }\n}',
          exp: "<strong>Strategy (Sliding Window):</strong> Expand right. On duplicate, jump left past the previous occurrence. Math.max(left, ...) prevents left from moving backward.",
        },
        {
          num: 9,
          title: "Binary Search",
          difficulty: "easy",
          topic: "Binary Search",
          desc: "Search a sorted array for a target value. Return its index, or -1 if not found. Must run in O(log n).",
          tc: "O(log n)",
          sc: "O(1)",
          code: '<span class="kw">class</span> <span class="type">Solution</span> {\n    <span class="kw">public int</span> <span class="fn">search</span>(<span class="type">int</span>[] <span class="var">nums</span>, <span class="type">int</span> <span class="var">target</span>) {\n        <span class="type">int</span> <span class="var">lo</span> = <span class="num">0</span>, <span class="var">hi</span> = <span class="var">nums</span>.length - <span class="num">1</span>;\n        <span class="kw">while</span> (<span class="var">lo</span> &lt;= <span class="var">hi</span>) {\n            <span class="type">int</span> <span class="var">mid</span> = <span class="var">lo</span> + (<span class="var">hi</span> - <span class="var">lo</span>) / <span class="num">2</span>; <span class="comment">// avoids overflow</span>\n            <span class="kw">if</span>      (<span class="var">nums</span>[<span class="var">mid</span>] == <span class="var">target</span>) <span class="kw">return</span> <span class="var">mid</span>;\n            <span class="kw">else if</span> (<span class="var">nums</span>[<span class="var">mid</span>] &lt;  <span class="var">target</span>) <span class="var">lo</span> = <span class="var">mid</span> + <span class="num">1</span>;\n            <span class="kw">else</span>                              <span class="var">hi</span> = <span class="var">mid</span> - <span class="num">1</span>;\n        }\n        <span class="kw">return</span> -<span class="num">1</span>;\n    }\n}',
          exp: "<strong>Strategy:</strong> Halve the search space each step. Use lo + (hi - lo) / 2 to avoid integer overflow. Return -1 only after the loop exits.",
        },
        {
          num: 10,
          title: "Number of Islands",
          difficulty: "medium",
          topic: "DFS / BFS",
          desc: "Given an m x n grid of '1' (land) and '0' (water), return the number of islands.",
          tc: "O(m×n)",
          sc: "O(m×n)",
          code: '<span class="kw">class</span> <span class="type">Solution</span> {\n    <span class="kw">public int</span> <span class="fn">numIslands</span>(<span class="type">char</span>[][] <span class="var">g</span>) {\n        <span class="type">int</span> <span class="var">cnt</span> = <span class="num">0</span>;\n        <span class="kw">for</span> (<span class="type">int</span> <span class="var">i</span>=<span class="num">0</span>; <span class="var">i</span>&lt;<span class="var">g</span>.length; <span class="var">i</span>++)\n            <span class="kw">for</span> (<span class="type">int</span> <span class="var">j</span>=<span class="num">0</span>; <span class="var">j</span>&lt;<span class="var">g</span>[<span class="num">0</span>].length; <span class="var">j</span>++)\n                <span class="kw">if</span> (<span class="var">g</span>[<span class="var">i</span>][<span class="var">j</span>]==\'1\') { <span class="fn">dfs</span>(<span class="var">g</span>,<span class="var">i</span>,<span class="var">j</span>); <span class="var">cnt</span>++; }\n        <span class="kw">return</span> <span class="var">cnt</span>;\n    }\n    <span class="kw">void</span> <span class="fn">dfs</span>(<span class="type">char</span>[][] <span class="var">g</span>, <span class="type">int</span> <span class="var">i</span>, <span class="type">int</span> <span class="var">j</span>) {\n        <span class="kw">if</span> (<span class="var">i</span>&lt;<span class="num">0</span>||<span class="var">i</span>&gt;=<span class="var">g</span>.length||<span class="var">j</span>&lt;<span class="num">0</span>||<span class="var">j</span>&gt;=<span class="var">g</span>[<span class="num">0</span>].length||<span class="var">g</span>[<span class="var">i</span>][<span class="var">j</span>]!=\'1\') <span class="kw">return</span>;\n        <span class="var">g</span>[<span class="var">i</span>][<span class="var">j</span>] = \'0\';\n        <span class="fn">dfs</span>(<span class="var">g</span>,<span class="var">i</span>+<span class="num">1</span>,<span class="var">j</span>); <span class="fn">dfs</span>(<span class="var">g</span>,<span class="var">i</span>-<span class="num">1</span>,<span class="var">j</span>); <span class="fn">dfs</span>(<span class="var">g</span>,<span class="var">i</span>,<span class="var">j</span>+<span class="num">1</span>); <span class="fn">dfs</span>(<span class="var">g</span>,<span class="var">i</span>,<span class="var">j</span>-<span class="num">1</span>);\n    }\n}',
          exp: "<strong>Strategy:</strong> When a '1' is found, DFS from it to sink the whole island (mark cells '0'). Each DFS call = one island counted exactly once.",
        },
        {
          num: 11,
          title: "Validate Binary Search Tree",
          difficulty: "medium",
          topic: "Tree / DFS",
          desc: "Given the root of a binary tree, determine if it is a valid BST.",
          tc: "O(n)",
          sc: "O(n)",
          code: '<span class="kw">class</span> <span class="type">Solution</span> {\n    <span class="kw">public boolean</span> <span class="fn">isValidBST</span>(<span class="type">TreeNode</span> <span class="var">root</span>) {\n        <span class="kw">return</span> <span class="fn">check</span>(<span class="var">root</span>, <span class="type">Long</span>.MIN_VALUE, <span class="type">Long</span>.MAX_VALUE);\n    }\n    <span class="kw">boolean</span> <span class="fn">check</span>(<span class="type">TreeNode</span> <span class="var">n</span>, <span class="type">long</span> <span class="var">lo</span>, <span class="type">long</span> <span class="var">hi</span>) {\n        <span class="kw">if</span> (<span class="var">n</span>==<span class="kw">null</span>) <span class="kw">return true</span>;\n        <span class="kw">if</span> (<span class="var">n</span>.val&lt;=<span class="var">lo</span> || <span class="var">n</span>.val&gt;=<span class="var">hi</span>) <span class="kw">return false</span>;\n        <span class="kw">return</span> <span class="fn">check</span>(<span class="var">n</span>.left, <span class="var">lo</span>, <span class="var">n</span>.val) &amp;&amp; <span class="fn">check</span>(<span class="var">n</span>.right, <span class="var">n</span>.val, <span class="var">hi</span>);\n    }\n}',
          exp: "<strong>Strategy:</strong> Pass min/max bounds down the tree. Going left updates max; going right updates min. Use Long to avoid Integer.MIN/MAX_VALUE edge cases.",
        },
        {
          num: 12,
          title: "Level Order Traversal (BFS)",
          difficulty: "medium",
          topic: "Tree / BFS",
          desc: "Return the level-order traversal of a binary tree's node values (left to right, level by level).",

            '<div class="divider"></div>' +
            '<div class="section-label">Problem</div>' +
            '<div class="problem-desc">' +
            q.desc +
            "</div>" +
            '<div class="complexity-row">' +
            '<span class="complexity-item">Time: <span>' +
            q.tc +
            "</span></span>" +
            '<span class="complexity-item">Space: <span>' +
            q.sc +
            "</span></span>" +
            "</div>" +
            '<div class="section-label">Solution</div>' +
            "<pre><code>" +
            q.code +
            "</code></pre>" +
            '<div class="section-label">Explanation</div>' +
            '<div class="explanation">' +
            q.exp +
            "</div>";

          d.appendChild(header);
          d.appendChild(body);
          c.appendChild(d);
        }
      }

      function toggle(h) {
        var b = h.nextElementSibling;
        var ic = h.querySelector(".toggle-icon");
        if (b.classList.contains("open")) {
          b.classList.remove("open");
          ic.innerHTML = "+";
        } else {
          b.classList.add("open");
          ic.innerHTML = "−";
        }
      }

      function filter(type, btn) {
        var btns = document.querySelectorAll(".filter-btn");
        for (var i = 0; i < btns.length; i++)
          btns[i].classList.remove("active");
        btn.classList.add("active");

        if (type === "all") {
          render(Q);
        } else {
          var filtered = [];
          for (var i = 0; i < Q.length; i++) {
            if (Q[i].difficulty === type) filtered.push(Q[i]);
          }
          render(filtered);
        }
      }

      render(Q);
    </script>
  </body>
</html>

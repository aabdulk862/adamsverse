<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Java Interview Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --card: #151d2e;
  --border: #1e2d45;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --accent3: #10b981;
  --text: #e2e8f0;
  --muted: #64748b;
  --easy: #10b981;
  --medium: #f59e0b;
  --hard: #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

header {
  position: relative;
  text-align: center;
  padding: 60px 20px 40px;
  z-index: 1;
}

.home-btn {
  position: absolute;
  top: 30px;
  right: 30px;
  padding: 8px 18px;
  background: var(--surface);
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  z-index: 10;
}

.home-btn:hover {
  background: rgba(0,212,255,0.1);
  border-color: var(--accent);
  color: var(--accent);
}

.header-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.2);
  padding: 4px 14px;
  border-radius: 20px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

h1 {
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  font-weight: 800;
  line-height: 1.1;
  background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 14px;
}

.subtitle {
  color: var(--muted);
  font-size: 1rem;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.5px;
}

/* Rest of your existing CSS remains unchanged */
.stats-bar, .filters, .container, .question-card, .card-header, .card-body, 
pre, .explanation, footer, ::-webkit-scrollbar {
  /* All your previous styles are kept exactly as before */
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 20px;
  margin: 0 auto 40px;
  max-width: 600px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  position: relative;
  z-index: 1;
  flex-wrap: wrap;
}

.stat { text-align: center; }
.stat-num { font-size: 1.6rem; font-weight: 800; display: block; }
.stat-label { font-size: 0.7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }

.stat-easy .stat-num { color: var(--easy); }
.stat-medium .stat-num { color: var(--medium); }
.stat-hard .stat-num { color: var(--hard); }
.stat-total .stat-num { color: var(--accent); }

.filters {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 0 20px 30px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.filter-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 7px 18px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.filter-btn:hover, .filter-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,255,0.07);
}

.filter-btn.easy.active { border-color: var(--easy); color: var(--easy); background: rgba(16,185,129,0.07); }
.filter-btn.medium.active { border-color: var(--medium); color: var(--medium); background: rgba(245,158,11,0.07); }
.filter-btn.hard.active { border-color: var(--hard); color: var(--hard); background: rgba(239,68,68,0.07); }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 80px;
  position: relative;
  z-index: 1;
}

.question-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 20px;
  overflow: hidden;
  transition: border-color 0.3s, transform 0.2s;
  animation: fadeUp 0.4s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.question-card:hover {
  border-color: rgba(0,212,255,0.3);
  transform: translateY(-1px);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 24px;
  cursor: pointer;
  user-select: none;
}

.q-number { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); min-width: 28px; }
.q-title { font-size: 1rem; font-weight: 700; flex: 1; }

.difficulty-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.easy-badge   { background: rgba(16,185,129,0.15); color: var(--easy);   border: 1px solid rgba(16,185,129,0.3); }
.medium-badge { background: rgba(245,158,11,0.15);  color: var(--medium); border: 1px solid rgba(245,158,11,0.3); }
.hard-badge   { background: rgba(239,68,68,0.15);   color: var(--hard);   border: 1px solid rgba(239,68,68,0.3); }

.topic-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  background: rgba(124,58,237,0.15);
  color: #a78bfa;
  border: 1px solid rgba(124,58,237,0.25);
}

.toggle-icon {
  color: var(--muted);
  font-size: 18px;
  min-width: 20px;
  text-align: center;
}

.card-body {
  display: none;
  padding: 0 24px 24px;
}

.card-body.open {
  display: block;
  animation: slideDown 0.25s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.divider { height: 1px; background: var(--border); margin-bottom: 20px; }

.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(0,212,255,0.15);
}

.problem-desc {
  color: #94a3b8;
  font-size: 0.9rem;
  line-height: 1.7;
  margin-bottom: 20px;
  font-family: 'JetBrains Mono', monospace;
}

.complexity-row {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.complexity-item {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

.complexity-item span { color: var(--accent3); font-weight: 600; }

pre {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  overflow-x: auto;
  margin-bottom: 16px;
  position: relative;
}

pre::before {
  content: 'JAVA';
  position: absolute;
  top: 8px;
  right: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
}

code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.8;
  color: #cdd9e5;
}

.kw { color: #ff79c6; }
.type { color: #8be9fd; }
.fn { color: #50fa7b; }
.str { color: #f1fa8c; }
.num { color: #bd93f9; }
.comment { color: #6272a4; font-style: italic; }
.var { color: #ffb86c; }

.explanation {
  background: rgba(0,212,255,0.04);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 14px 18px;
  font-size: 0.88rem;
  line-height: 1.75;
  color: #94a3b8;
  font-family: 'JetBrains Mono', monospace;
}

.explanation strong { color: var(--text); }

footer {
  text-align: center;
  padding: 30px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  position: relative;
  z-index: 1;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<header>
  <a href="/" class="home-btn">← Back to Home</a>
  <div class="header-tag">&#x2B50; Interview Prep</div>
  <h1>LeetCode Java<br>Interview Bible</h1>
  <p class="subtitle">// 20 most common coding interview questions</p>
</header>

<div class="stats-bar">
  <div class="stat stat-total"><span class="stat-num">20</span><span class="stat-label">Total</span></div>
  <div class="stat stat-easy"><span class="stat-num">7</span><span class="stat-label">Easy</span></div>
  <div class="stat stat-medium"><span class="stat-num">10</span><span class="stat-label">Medium</span></div>
  <div class="stat stat-hard"><span class="stat-num">3</span><span class="stat-label">Hard</span></div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filter('all', this)">All</button>
  <button class="filter-btn easy" onclick="filter('easy', this)">Easy</button>
  <button class="filter-btn medium" onclick="filter('medium', this)">Medium</button>
  <button class="filter-btn hard" onclick="filter('hard', this)">Hard</button>
</div>

<div class="container" id="questions"></div>

<footer>crafted for engineers &mdash; study hard, ship fast</footer>

<script>
var Q = [ /* Your full 20-question array goes here - exactly the same as before */ 
  // ... (paste all 20 questions from your previous version here)
  // To save space in this message, I'm indicating where they go. Use the full Q array from my earlier complete response.
];

function pad(n) {
  return n < 10 ? '0' + n : '' + n;
}

function render(data) {
  var c = document.getElementById('questions');
  c.innerHTML = '';
  for (var idx = 0; idx < data.length; idx++) {
    var q = data[idx];
    var d = document.createElement('div');
    d.className = 'question-card';
    d.setAttribute('data-difficulty', q.difficulty);
    d.style.animationDelay = (idx * 0.04) + 's';

    var header = document.createElement('div');
    header.className = 'card-header';
    header.setAttribute('onclick', 'toggle(this)');
    header.innerHTML =
      '<span class="q-number">#' + pad(q.num) + '</span>' +
      '<span class="q-title">' + q.title + '</span>' +
      '<span class="topic-tag">' + q.topic + '</span>' +
      '<span class="difficulty-badge ' + q.difficulty + '-badge">' + q.difficulty + '</span>' +
      '<span class="toggle-icon">+</span>';

    var body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML =
      '<div class="divider"></div>' +
      '<div class="section-label">Problem</div>' +
      '<div class="problem-desc">' + q.desc + '</div>' +
      '<div class="complexity-row">' +
        '<span class="complexity-item">Time: <span>' + q.tc + '</span></span>' +
        '<span class="complexity-item">Space: <span>' + q.sc + '</span></span>' +
      '</div>' +
      '<div class="section-label">Solution</div>' +
      '<pre><code>' + q.code + '</code></pre>' +
      '<div class="section-label">Explanation</div>' +
      '<div class="explanation">' + q.exp + '</div>';

    d.appendChild(header);
    d.appendChild(body);
    c.appendChild(d);
  }
}

function toggle(h) {
  var b = h.nextElementSibling;
  var ic = h.querySelector('.toggle-icon');
  if (b.classList.contains('open')) {
    b.classList.remove('open');
    ic.innerHTML = '+';
  } else {
    b.classList.add('open');
    ic.innerHTML = '−';
  }
}

function filter(type, btn) {
  var btns = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');

  if (type === 'all') {
    render(Q);
  } else {
    var filtered = [];
    for (var i = 0; i < Q.length; i++) {
      if (Q[i].difficulty === type) filtered.push(Q[i]);
    }
    render(filtered);
  }
}

render(Q);
</script>

</body>
</html>
